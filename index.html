<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/assets/css/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM</title>
  </head>
  <body class="bg-body-secondary">
    <header
      class="w-100 bg-primary p-2 d-flex justify-content-between justify-content-center align-items-center"
    >
      <h1 class="text-light fs-3 fw-bolder">Super-Heros</h1>
      <button class="btn btn-primary bg-secondary" id="Agregar">Agregar Heroe +</button>
    </header>
    <main class="position-relative"> 
      <section>
        <div class="container mt-4">
          <div class="input-group">
            <input
              type="text"
              class="form-control"
              placeholder="Buscar personaje..."
              id="busqueda"
            />
            <button class="btn btn-primary" id="enviar">Buscar</button>
          </div>
        </div>

        <!-- personajes grilla -->
        <div class="container w-100 vh-100 container-fluid mt-4">
            <div class="row g-3" id="cards-grid">
              <!-- <div class="col">
                <div class="card" style="width: 18rem">
                  <img src="..." class="card-img-top" alt="..." />
                  <div class="card-body">
                    <h5 class="card-title">Card title</h5>
                    <a href="#" class="btn btn-primary">Go somewhere</a>
                  </div>
                </div>
              </div> -->
            </div>
          </div>
        </div>
      </section>

      <section class="position-fixed d-none container-fluid d-flex justify-content-center align-items-center flex-column p-4" id="section-form">
          <form class="bloque d-flex justify-content-center align-items-center flex-column bg-white border p-3 rounded-1" id="form-personaje">
            <h2 class="mb-4">Carga tu personaje</h2>

            <label for="name" class="fs-5 fw-bolder">Nombre Personaje</label>
            <input type="text" id="name" required class="rounded border-1 p-1 mb-3" placeholder="Batman ">

            <label for="url-img" class="fs-5 fw-bolder">Url de la imagen</label>
            <input type="url" required name="img-url" id="img-url" placeholder="htpps///.." class="rounded border-1 p-1 mb-2">

            <div class="btns d-flex justify-content-center align-items-center gap-2 m-4" >
              <button type="submit" class="btn bg-primary text-light fw-bolder" id="btn-crear" >Cargar personaje</button>
              <button type="button" class="btn bg-secondary text-light fw-bolder btn-cancel">Cancelar</button>
            </div>
        </form>
      </section>
    </main>
    <script src="/assets/js/app.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
